<!DOCTYPE html>
<html lang="EN">
<head>
    <link rel="stylesheet" href="globals.css">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline'">
    <title>THE-JABBA-INITIATIVE</title>
</head>
<body>
<div id="game-container">
    <div id="aquarium">
        <div id="bg" class="full-scene" style="z-index: 0;"></div>

        <div id="layer4" class="full-scene" style="z-index: 10;"></div>
        <div id="layer3" class="full-scene" style="z-index: 20;"></div>
        <div id="layer2" class="full-scene" style="z-index: 30;"></div>
        <div id="layer1" class="full-scene" style="z-index: 40;"></div>

        <div id="front" class="full-scene" style="z-index: 100;"></div>

    </div>

    <div id="ui">
        <div style="-webkit-app-region: drag; flex-grow: 1; color: white; padding-left: 10px;">Drag UI</div>
        <button id="btn-frog" style="-webkit-app-region: no-drag;">Spawn Frog</button>
        <button id="btn-food" style="-webkit-app-region: no-drag;">Spawn Food</button>
        <button id="btn-deco" style="-webkit-app-region: no-drag;">Add Deco</button>
        <button id="btn-logs" style="-webkit-app-region: no-drag;">Logs</button>
    </div>
</div>
<script type="module" src="scripts/renderer.js"></script>
</body>
</html>
